<!DOCTYPE html>
<html>

<head>

<title>Nature Secrets Admin Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Nature Secrets Admin Dashboard</h1>


<input type="text"
id="item-name"
placeholder="Product Name">


<input type="number"
id="item-price"
placeholder="Price">


<input type="text"
id="item-category"
placeholder="Category">


<input type="text"
id="item-image"
placeholder="Image Link">


<select id="item-type">

<option value="product">Product</option>
<option value="offer">Offer</option>

</select>


<button id="add-item">

Add Item

</button>


<hr>


<h2>Current Items</h2>


<div id="items-list">

</div>


</div>

<script src="script.js"></script>

</body>

</html>
