<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - Nature Secrets</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LOGO -->

        <img src="images/logo.jpg"
             alt="Nature Secrets Logo">


        <!-- PAGE TITLE -->

        <h1>سلة التسوق</h1>


        <!-- HOME BUTTON -->

        <button id="home-button">

            العودة إلى الصفحة الرئيسية

        </button>


        <!-- EMPTY CART MESSAGE -->

        <p id="empty-cart-message">

            سلة التسوق فارغة.

            <br>

            ابدأ بإضافة بعض المنتجات أو العروض.

        </p>


        <!-- CART PRODUCTS -->

        <div id="cart-items">

            <!-- Products will appear here automatically -->

        </div>


        <!-- TOTAL PRICE -->

        <h2>

            إجمالي الطلب

        </h2>

        <p id="total-price">

            0 جنيه

        </p>


        <!-- CUSTOMER INFORMATION -->

        <h2>

            بيانات العميل

        </h2>


        <input type="text"
               id="customer-name"
               placeholder="الاسم بالكامل"
               required>


        <input type="tel"
               id="customer-phone"
               placeholder="رقم الهاتف"
               required>


        <textarea 
    id="customer-address"
    placeholder="العنوان بالتفصيل"
    rows="4"
    required>
</textarea>


<textarea 
    id="customer-notes"
    placeholder="ملاحظات (اختياري)"
    rows="5">
</textarea>

        <!-- ACTION BUTTONS -->

        <button id="place-order-button">

            إتمام الطلب

        </button>



        <button id="continue-shopping-button">

            متابعة التسوق

        </button>


        <!-- EMPTY CART BUTTONS -->

        <button id="browse-products-button">

            تصفح المنتجات

        </button>


        <button id="browse-offers-button">

            تصفح العروض

        </button>


    </div>



    <!-- ORDER SUCCESS POPUP -->

<div id="order-success-popup" class="popup-overlay">

    <div class="popup-box">

        <h1>✓</h1>

        <h2>تم إرسال طلبك بنجاح!</h2>

        <h3 id="popup-order-id"></h3>

        <p>
            شكراً لاختيارك Nature Secrets ❤
        </p>

        <p>
            سيتم التواصل معك قريباً.
        </p>

        <p>
            سيتم تحويلك إلى الصفحة الرئيسية خلال 3 ثوانٍ...
        </p>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
